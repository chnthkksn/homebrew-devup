name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update formula for release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          FORMULA="packaging/homebrew/Formula/devup.rb"
          URL="https://github.com/${OWNER}/${REPO}/archive/refs/tags/${TAG}.tar.gz"

          curl -sSL -o "/tmp/devup-${TAG}.tar.gz" "${URL}"
          SHA="$(sha256sum "/tmp/devup-${TAG}.tar.gz" | awk '{print $1}')"

          perl -0pi -e "s|homepage \".*\"|homepage \"https://github.com/${OWNER}/${REPO}\"|g" "${FORMULA}"
          perl -0pi -e "s|url \".*\"|url \"${URL}\"|g" "${FORMULA}"
          perl -0pi -e "s|sha256 \".*\"|sha256 \"${SHA}\"|g" "${FORMULA}"

      - name: Commit formula changes
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formula changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add packaging/homebrew/Formula/devup.rb
            git commit -m "chore(homebrew): update formula for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi

      - name: Build release binaries
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -o "dist/devup_${TAG}_linux_amd64" ./cmd/devup
          GOOS=linux GOARCH=arm64 go build -o "dist/devup_${TAG}_linux_arm64" ./cmd/devup
          GOOS=darwin GOARCH=amd64 go build -o "dist/devup_${TAG}_darwin_amd64" ./cmd/devup
          GOOS=darwin GOARCH=arm64 go build -o "dist/devup_${TAG}_darwin_arm64" ./cmd/devup

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/devup_*
            packaging/homebrew/Formula/devup.rb
          overwrite_files: true
